name: Docker Build & Publish

on:
    push:
        branches: [prod, dev]

env:
    REGISTRY: ghcr.io
    IMAGE_PREFIX: ${{ github.repository_owner }}/digital-canvas

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        strategy:
            matrix:
                app:
                    - name: web
                      dockerfile: canvas/apps/web/Dockerfile
                      context: canvas
                    - name: http-backend
                      dockerfile: canvas/apps/http-backend/Dockerfile
                      context: canvas
                    - name: ws-backend
                      dockerfile: canvas/apps/ws-backend/Dockerfile
                      context: canvas

        steps:
            - uses: actions/checkout@v4

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Generate Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app.name }}
                  tags: |
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/prod' }}
                      type=raw,value=staging,enable=${{ github.ref == 'refs/heads/dev' }}
                      type=sha,prefix=,format=short

            - name: Build and push — ${{ matrix.app.name }}
              uses: docker/build-push-action@v6
              with:
                  context: ${{ matrix.app.context }}
                  file: ${{ matrix.app.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
                      NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
                      NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
                      NEXT_PUBLIC_HTTP_URL=${{ secrets.NEXT_PUBLIC_HTTP_URL }}
