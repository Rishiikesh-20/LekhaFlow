name: Deploy to Production

on:
    workflow_dispatch: # Temporarily manual-only until production VM is configured
    # workflow_run:
    #     workflows: ["Docker Build & Publish"]
    #     types: [completed]
    #     branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.conclusion == 'success' }}

        environment: production

        steps:
            - uses: actions/checkout@v4

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.PRODUCTION_SSH_HOST }}
                  username: ${{ secrets.PRODUCTION_SSH_USER }}
                  key: ${{ secrets.PRODUCTION_SSH_KEY }}
                  script: |
                      set -e

                      # Navigate to project directory
                      cd ~/digital-canvas

                      # Pull latest compose files
                      git fetch origin main
                      git checkout main
                      git pull origin main

                      # Login to GHCR
                      echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

                      # Pull latest images
                      docker compose -f canvas/docker-compose.yml -f canvas/docker-compose.production.yml pull

                      # Deploy with zero-downtime rolling update
                      docker compose -f canvas/docker-compose.yml -f canvas/docker-compose.production.yml up -d --remove-orphans

                      # Prune old images
                      docker image prune -f

            - name: Verify deployment health
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.PRODUCTION_SSH_HOST }}
                  username: ${{ secrets.PRODUCTION_SSH_USER }}
                  key: ${{ secrets.PRODUCTION_SSH_KEY }}
                  script: |
                      sleep 30
                      curl -sf http://localhost:3000/ > /dev/null && echo "✅ Web OK" || echo "❌ Web FAILED"
                      curl -sf http://localhost:8000/health > /dev/null && echo "✅ HTTP Backend OK" || echo "❌ HTTP Backend FAILED"
                      wget -qO- --spider http://localhost:8081/ && echo "✅ WS Backend OK" || echo "❌ WS Backend FAILED"
