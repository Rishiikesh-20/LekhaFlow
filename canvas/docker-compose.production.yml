## ─────────────────────────────────────────────
## Docker Compose — Production Override
## Usage:
##   docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
## ─────────────────────────────────────────────

services:
  http-backend:
    image: ghcr.io/${GHCR_OWNER:-anusanth26}/digital-canvas-http-backend:latest
    restart: always
    environment:
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}

  ws-backend:
    image: ghcr.io/${GHCR_OWNER:-anusanth26}/digital-canvas-ws-backend:latest
    restart: always
    environment:
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}

  web:
    image: ghcr.io/${GHCR_OWNER:-anusanth26}/digital-canvas-web:latest
    restart: always
