## ─────────────────────────────────────────────
## Digital Canvas — Docker Compose
## Usage:
##   docker compose --env-file .env.docker up --build
## ─────────────────────────────────────────────

services:
  # ── Postgres ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-canvas}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── HTTP Backend (Express) ──
  http-backend:
    build:
      context: .
      dockerfile: apps/http-backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      NODE_ENV: ${NODE_ENV:-production}
      WS_PORT: ${WS_PORT:-8080}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8000/health",
        ]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── WebSocket Backend (Hocuspocus) ──
  ws-backend:
    build:
      context: .
      dockerfile: apps/ws-backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      NODE_ENV: ${NODE_ENV:-production}
      WS_PORT: ${WS_PORT:-8080}
      WS_HEALTH_PORT: ${WS_HEALTH_PORT:-8081}
    ports:
      - "8080:8080"
      - "8081:8081"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8081/",
        ]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Frontend (Next.js) ──
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
        NEXT_PUBLIC_HTTP_URL: ${NEXT_PUBLIC_HTTP_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      http-backend:
        condition: service_healthy
      ws-backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/",
        ]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  pgdata:
    driver: local
